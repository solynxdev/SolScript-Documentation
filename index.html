<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SolScript Documentation</title>

    <link rel="stylesheet"
        href="assets/css/style.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
          rel="stylesheet">

</head>

<body>

    <div class="background">

        <div class="light light-1"></div>
        <div class="light light-2"></div>
        <div class="light light-3"></div>

    </div>

    <div class="app">

        <aside id="sidebar"
               class="sidebar panel">

            <div class="sidebar-header">

                <div class="logo">

                    <div class="logo-icon">
                        S
                    </div>

                    <div>

                        <h1>SolScript</h1>

                        <span>Documentation</span>

                    </div>

                </div>

            </div>

            <div class="search">

                <input id="search-input"
                       type="text"
                       placeholder="Search Documentation...">

            </div>

            <nav id="sidebar-navigation">

            </nav>

            <div class="sidebar-footer">

                v0.1.0

            </div>

        </aside>

        <main class="main">

            <header class="header panel">

                <button class="icon-button">
                    ☰
                </button>

                <h2 id="page-title">
                    Introduction
                </h2>

                <button class="icon-button">
                    <a href="https://github.com/solynxdev/SolScript" target="_blank" rel="noopener noreferrer" style="text-decoration: none; color: inherit;">GitHub</a>
                </button>

            </header>

            <div class="content-layout">

                <section id="doc-content"
                         class="content panel">

                    Loading Documentation...

                </section>

                <aside id="toc"
                       class="toc panel">

                    <h3>

                        On This Page

                    </h3>

                    <nav id="toc-navigation">

                    </nav>

                </aside>

            </div>

        </main>

    </div>

</html>
